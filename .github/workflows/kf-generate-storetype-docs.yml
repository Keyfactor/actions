name: Generate README from templates and data files
on:
  workflow_call:
    secrets:
      token: 
        description: 'Secret token from caller workflow to approve readme'
        required: true

jobs:
  generate-storetype-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: keyfactor/imagetool@v1.3.1
        with:
          token: ${{ secrets.token }}

          # Behavior configuration for imagetool
          generate-storetype-screenshots: 'true'
          image-directory: .github/images
          generate-storetype-docs: 'true'
          markdown-doc-name: 'storetype_source.md'

          # Configuration values for the Keyfactor Command server
          command-hostname: ${{ secrets.COMMAND_HOSTNAME }}
          command-domain: ${{ secrets.COMMAND_DOMAIN }}
          command-username: ${{ secrets.COMMAND_USERNAME }}
          command-password: ${{ secrets.COMMAND_PASSWORD }}
          command-base-api-path: ${{ secrets.COMMAND_BASE_API_PATH }}
          command-base-ui-path: ${{ secrets.COMMAND_BASE_UI_PATH }}

