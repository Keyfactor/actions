name: Keyfactor Integration CI/CD

# =============================================================================
# Keyfactor Integration Bootstrap Workflow (v6)
#
# This workflow orchestrates the complete CI/CD pipeline for Keyfactor
# integrations. It is designed to be called from downstream repositories.
#
# Architecture:
#   Phase 1: Context Detection (language, manifest, config files)
#   Phase 2: Quality Gates (PR checks, signoff summary)
#   Phase 3: Release Management (versioning, GitHub releases)
#   Phase 4: Build (language-specific build workflows)
#   Phase 5: Post-Release (SBOM, docs, catalog)
#   Phase 6: Repository Config (branch protection, teams)
#
# Event Handling:
#   - pull_request  → Quality checks + builds + pre-releases
#   - push (main)   → README generation, catalog updates
#   - create        → Repository configuration for release branches
# =============================================================================

on:
  workflow_call:
    secrets:
      token:
        description: 'GitHub token for API access'
        required: true
      gpg_key:
        description: 'GPG private key for signing'
        required: true
      gpg_pass:
        description: 'GPG passphrase'
        required: true
      docker-user:
        description: 'DockerHub username'
        required: false
      docker-token:
        description: 'DockerHub token'
        required: false
      scan_token:
        description: 'Polaris scan token'
        required: false
      entra_username:
        description: 'Entra username for doctool'
        required: false
      entra_password:
        description: 'Entra password for doctool'
        required: false
      command_client_id:
        description: 'Command API client ID'
        required: false
      command_client_secret:
        description: 'Command API client secret'
        required: false
    inputs:
      command_token_url:
        type: string
        description: 'Command token endpoint URL'
        required: false
      command_hostname:
        type: string
        description: 'Command API hostname'
        required: false
      command_base_api_path:
        type: string
        description: 'Command API base path'
        required: false

jobs:
  # ===========================================================================
  # PHASE 1: Context Detection
  # ===========================================================================

  detect-context:
    name: Detect Context
    runs-on: ubuntu-latest
    outputs:
      # Language detection
      primary_language: ${{ steps.language.outputs.primary_language }}
      is_csharp: ${{ steps.language.outputs.is_csharp }}
      is_go: ${{ steps.language.outputs.is_go }}
      is_java: ${{ steps.language.outputs.is_java }}
      # Manifest values
      release_dir: ${{ steps.manifest.outputs.release_dir }}
      release_project: ${{ steps.manifest.outputs.release_project }}
      integration_type: ${{ steps.manifest.outputs.integration_type }}
      update_catalog: ${{ steps.manifest.outputs.update_catalog }}
      platform_matrix: ${{ steps.manifest.outputs.platform_matrix }}
      # File checks
      goreleaser_exists: ${{ steps.goreleaser.outputs.exists }}
    steps:
      - name: Checkout
        uses: keyfactor/checkout@v4

      - name: Detect language
        id: language
        uses: Keyfactor/actions/.github/actions/detect-language@v6

      - name: Parse manifest
        id: manifest
        uses: Keyfactor/actions/.github/actions/parse-manifest@v6

      - name: Check GoReleaser
        id: goreleaser
        uses: Keyfactor/actions/.github/actions/check-file-exists@v6
        with:
          files: ".goreleaser.y*ml"

  # ===========================================================================
  # PHASE 2: Quality Gates (PR only)
  # ===========================================================================

  quality-checks:
    name: Quality Checks
    needs: detect-context
    if: github.event_name == 'pull_request'
    uses: Keyfactor/actions/.github/workflows/pr-quality-checks.yml@v6
    with:
      primary_language: ${{ needs.detect-context.outputs.primary_language }}

  signoff-summary:
    name: Signoff Summary
    needs: [detect-context, quality-checks]
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.event.pull_request.base.ref, 'release-')
    uses: Keyfactor/actions/.github/workflows/signoff-summary.yml@v6
    with:
      secrets_scan_passed: ${{ needs.quality-checks.outputs.secrets_scan_passed }}
      secrets_scan_findings: ${{ needs.quality-checks.outputs.secrets_scan_findings }}
      changelog_passed: ${{ needs.quality-checks.outputs.changelog_passed }}
      changelog_findings: ${{ needs.quality-checks.outputs.changelog_findings }}
      pii_check_passed: ${{ needs.quality-checks.outputs.pii_check_passed }}
      pii_check_findings: ${{ needs.quality-checks.outputs.pii_check_findings }}
      manifest_passed: ${{ needs.quality-checks.outputs.manifest_passed }}
      manifest_findings: ${{ needs.quality-checks.outputs.manifest_findings }}
      code_quality_passed: ${{ needs.quality-checks.outputs.code_quality_passed }}
      code_quality_findings: ${{ needs.quality-checks.outputs.code_quality_findings }}
      all_checks_passed: ${{ needs.quality-checks.outputs.all_checks_passed }}
      pr_title_passed: ${{ needs.quality-checks.outputs.pr_title_passed }}
      pr_title_findings: ${{ needs.quality-checks.outputs.pr_title_findings }}
      pr_size_passed: ${{ needs.quality-checks.outputs.pr_size_passed }}
      pr_size_findings: ${{ needs.quality-checks.outputs.pr_size_findings }}
      dependency_review_passed: ${{ needs.quality-checks.outputs.dependency_review_passed }}
      dependency_review_findings: ${{ needs.quality-checks.outputs.dependency_review_findings }}
      breaking_change_detected: ${{ needs.quality-checks.outputs.breaking_change_detected }}
      breaking_change_findings: ${{ needs.quality-checks.outputs.breaking_change_findings }}
      prohibited_keywords_passed: ${{ needs.quality-checks.outputs.prohibited_keywords_passed }}
      prohibited_keywords_findings: ${{ needs.quality-checks.outputs.prohibited_keywords_findings }}
      vulnerability_scan_passed: ${{ needs.quality-checks.outputs.vulnerability_scan_passed }}
      vulnerability_scan_findings: ${{ needs.quality-checks.outputs.vulnerability_scan_findings }}
      formatting_passed: ${{ needs.quality-checks.outputs.formatting_passed }}
      formatting_findings: ${{ needs.quality-checks.outputs.formatting_findings }}
      license_compliance_passed: ${{ needs.quality-checks.outputs.license_compliance_passed }}
      license_compliance_findings: ${{ needs.quality-checks.outputs.license_compliance_findings }}

  # ===========================================================================
  # PHASE 3: Release Management (PR to release branch)
  # ===========================================================================

  create-release:
    name: Create Release
    if: github.event_name == 'pull_request'
    uses: Keyfactor/actions/.github/workflows/create-release.yml@v6

  # ===========================================================================
  # PHASE 4: Build (language-specific)
  # ===========================================================================

  build-dotnet:
    name: Build (.NET)
    needs: [detect-context, create-release]
    if: |
      needs.detect-context.outputs.is_csharp == 'true' &&
      needs.create-release.outputs.is_release_branch == 'true'
    uses: Keyfactor/actions/.github/workflows/dotnet-build-and-release.yml@v6
    with:
      release_version: ${{ needs.create-release.outputs.release_version }}
      release_url: ${{ needs.create-release.outputs.release_url }}
      release_dir: ${{ needs.detect-context.outputs.release_dir }}
      release_project: ${{ needs.detect-context.outputs.release_project }}
      integration_type: ${{ needs.detect-context.outputs.integration_type }}
    secrets:
      token: ${{ secrets.token }}

  build-go:
    name: Build (Go)
    needs: [detect-context, create-release]
    if: |
      needs.detect-context.outputs.is_go == 'true' &&
      needs.detect-context.outputs.goreleaser_exists == 'true' &&
      needs.create-release.outputs.is_release_branch == 'true'
    uses: Keyfactor/actions/.github/workflows/go-build-and-release.yml@v6
    with:
      release_version: ${{ needs.create-release.outputs.release_version }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
      gpg_key: ${{ secrets.gpg_key }}
      gpg_pass: ${{ secrets.gpg_pass }}

  # ===========================================================================
  # PHASE 5: Post-Release Tasks
  # ===========================================================================

  post-release:
    name: Post-Release
    needs: [detect-context, create-release]
    if: needs.create-release.outputs.is_full_release == 'true'
    uses: Keyfactor/actions/.github/workflows/kf-post-release.yml@v6
    secrets:
      token: ${{ secrets.token }}
    with:
      branchname: ${{ github.event.pull_request.base.ref }}
      release_version: ${{ needs.create-release.outputs.release_version }}

  generate-sbom:
    name: Generate SBOM
    needs: [detect-context, create-release]
    if: needs.create-release.outputs.is_full_release == 'true'
    uses: Keyfactor/actions/.github/workflows/sbom-generation.yml@v6
    with:
      primary_language: ${{ needs.detect-context.outputs.primary_language }}
      release_version: ${{ needs.create-release.outputs.release_version }}
    secrets:
      token: ${{ secrets.token }}

  # ===========================================================================
  # PHASE 5b: Documentation & Catalog (push to main)
  # ===========================================================================

  generate-readme:
    name: Generate README
    permissions:
      contents: write
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: Keyfactor/actions/.github/workflows/generate-readme.yml@v6
    with:
      command_token_url: ${{ vars.COMMAND_TOKEN_URL }}
      command_hostname: ${{ vars.COMMAND_HOSTNAME }}
      command_base_api_path: ${{ vars.COMMAND_API_PATH }}
    secrets:
      token: ${{ secrets.token }}
      entra_username: ${{ secrets.entra_username }}
      entra_password: ${{ secrets.entra_password }}
      command_client_id: ${{ secrets.command_client_id }}
      command_client_secret: ${{ secrets.command_client_secret }}

  update-catalog:
    name: Update Catalog
    needs: detect-context
    if: |
      needs.detect-context.outputs.update_catalog == 'true' &&
      github.ref_name == 'main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: Keyfactor/actions/.github/workflows/update-catalog.yml@v6
    secrets:
      token: ${{ secrets.token }}

  # ===========================================================================
  # PHASE 6: Repository Configuration (release branch creation)
  # ===========================================================================

  configure-repo:
    name: Configure Repository
    if: github.event_name == 'create' && startsWith(github.ref, 'refs/heads/release-')
    uses: Keyfactor/actions/.github/workflows/kf-configure-repo.yml@v6
    secrets:
      token: ${{ secrets.token }}
