name: Go Build and Release

# =============================================================================
# Go Build and Release Workflow
#
# Builds Go applications using GoReleaser with GPG signing.
# Supports separate Windows GUI builds with Fyne.
# =============================================================================

on:
  workflow_call:
    inputs:
      release_version:
        description: Condition based on release branch build
        required: false
        type: string
      separate_windows_build:
        description: Build Windows artifacts in a separate workflow
        required: false
        type: boolean
        default: true

    secrets:
      token:
        description: 'Secret token from caller workflow to access private packages'
        required: true
      gpg_key:
        description: 'GPG Private Key'
        required: true
      gpg_pass:
        description: 'GPG Passphrase'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  run-goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Allow goreleaser to access older tag information.
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            xorg-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            pkg-config

      - name: get-is-release
        run: |
          if [[ ("${{ github.event_name }}" == "pull_request") && "${{ inputs.release_version }}" != "" ]]; then
            echo "GO_ARGS=release --clean" | tee -a "$GITHUB_ENV" 
            echo "VERSION=${{ inputs.release_version }}" | tee -a "$GITHUB_ENV"  | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "GO_ARGS=build --snapshot" | tee -a "$GITHUB_ENV" 
            echo "VERSION=0.0.0" | tee -a "$GITHUB_ENV"  | tee -a "$GITHUB_STEP_SUMMARY"
          fi
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.gpg_key }}
          passphrase: ${{ secrets.gpg_pass }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: ${{ env.GO_ARGS }}
        env:
          # GitHub sets the GITHUB_TOKEN secret automatically.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GPG_TTY: $(tty)
          Version: ${{ env.VERSION }}

  run-windows-fyne-build:
    needs: run-goreleaser
    if: inputs.separate_windows_build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Fyne dependencies
        run: |
          choco install mingw --no-progress -y
          echo "C:\ProgramData\mingw64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest


      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ inputs.release_version }}" != "" ]]; then
            echo "VERSION=${{ inputs.release_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=0.0.0-snapshot" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Windows Fyne application
        shell: bash
        run: |
          go build -ldflags "-X main.Version=${{ steps.version.outputs.VERSION }}" -tags gui -o dist/

      - name: Package with Fyne
        run: |
          fyne package -os windows -release

      - name: Zip Windows executable
        if: inputs.release_version != ''
        shell: pwsh
        run: |
          $exeFile = Get-ChildItem -Filter "*.exe" | Select-Object -First 1
          $baseName = $exeFile.BaseName
          $zipName = "${baseName}-gui_${{ inputs.release_version }}_windows_amd64.zip"
          Compress-Archive -Path $exeFile.FullName -DestinationPath $zipName
          echo "WINDOWS_ZIP=$zipName" >> $env:GITHUB_ENV

      - name: Upload Windows artifacts to release
        if: inputs.release_version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_version }}
          files: ${{ env.WINDOWS_ZIP }}
          token: ${{ secrets.token }}
