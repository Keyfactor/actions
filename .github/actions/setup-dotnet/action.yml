name: 'Setup .NET Environment'
description: 'Sets up .NET SDK with NuGet authentication, package caching, and dependency restoration'
author: 'Keyfactor'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  dotnet-version:
    description: '.NET SDK version(s) to install'
    required: false
    default: '8.0.x'
  nuget-auth-token:
    description: 'Token for GitHub Packages NuGet authentication'
    required: false
    default: ''
  nuget-source-url:
    description: 'NuGet source URL for private packages'
    required: false
    default: 'https://nuget.pkg.github.com/Keyfactor/index.json'
  restore:
    description: 'Whether to run dotnet restore'
    required: false
    default: 'true'
  cache:
    description: 'Whether to cache NuGet packages'
    required: false
    default: 'true'

outputs:
  dotnet-version:
    description: 'Installed .NET SDK version'
    value: ${{ steps.setup.outputs.dotnet-version }}
  cache-hit:
    description: 'Whether the cache was hit'
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Setup .NET SDK
      id: setup
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Cache NuGet packages
      id: cache
      if: inputs.cache == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Authenticate NuGet with GitHub Packages
      if: inputs.nuget-auth-token != ''
      shell: bash
      run: |
        # Remove existing source if present (ignore errors)
        dotnet nuget remove source keyfactor-github 2>/dev/null || true

        # Add authenticated source
        dotnet nuget add source "${{ inputs.nuget-source-url }}" \
          --name keyfactor-github \
          --username ${{ github.actor }} \
          --password ${{ inputs.nuget-auth-token }} \
          --store-password-in-clear-text

    - name: Restore dependencies
      if: inputs.restore == 'true'
      shell: bash
      run: dotnet restore

    - name: Display .NET info
      shell: bash
      run: |
        echo "### .NET Environment" >> "$GITHUB_STEP_SUMMARY"
        echo "- **SDK Version:** $(dotnet --version)" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Cache Hit:** ${{ steps.cache.outputs.cache-hit || 'N/A' }}" >> "$GITHUB_STEP_SUMMARY"
